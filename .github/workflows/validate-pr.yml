name: Validate PR (Dry Run)

# This triggers ONLY when a Pull Request is opened or updated against main
on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authenticate to Target Org
        run: |
          echo "${{ secrets.SF_TARGET_AUTH_URL }}" > sfdx_auth.txt
          sf org login sfdx-url --sfdx-url-file sfdx_auth.txt --set-default --alias TargetOrg
          rm sfdx_auth.txt

      - name: Validate Deployment
        run: |
          BASE=origin/${{ github.base_ref }}

          # Resolve test classes for changed files
          TEST_CLASSES=$(node scripts/resolve-tests.js $BASE)

          # Build --metadata flags for only the changed Apex classes
          METADATA_FLAGS=$(git diff --name-only $BASE...HEAD \
            | grep '\.cls$' \
            | xargs -I{} basename {} .cls \
            | sed 's/^/--metadata ApexClass:/' \
            | tr '\n' ' ')

          if [ -n "$TEST_CLASSES" ] && [ -n "$METADATA_FLAGS" ]; then
            echo "Running RunSpecifiedTests for: $TEST_CLASSES"
            echo "Deploying only: $METADATA_FLAGS"
            sf project deploy start \
              --target-org TargetOrg \
              --dry-run \
              --test-level RunSpecifiedTests \
              --tests "$TEST_CLASSES" \
              $METADATA_FLAGS \
              --ignore-conflicts
          else
            echo "No specific classes detected — running full deployment with RunLocalTests"
            sf project deploy start \
              --target-org TargetOrg \
              --dry-run \
              --test-level RunLocalTests \
              --ignore-conflicts
          fi
