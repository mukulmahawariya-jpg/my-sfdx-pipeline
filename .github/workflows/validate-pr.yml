name: Validate PR (Dry Run)

# This triggers ONLY when a Pull Request is opened or updated against main
on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authenticate to Target Org
        run: |
          echo "${{ secrets.SF_TARGET_AUTH_URL }}" > sfdx_auth.txt
          sf org login sfdx-url --sfdx-url-file sfdx_auth.txt --set-default --alias TargetOrg
          rm sfdx_auth.txt

      # Notice the --dry-run flag. This validates the code but DOES NOT save it.
      - name: Validate Deployment
        run: sf project deploy start --target-org TargetOrg --dry-run --test-level RunLocalTests --ignore-conflicts