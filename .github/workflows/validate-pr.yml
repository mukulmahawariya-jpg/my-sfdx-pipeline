name: Validate PR (Dry Run)

# This triggers ONLY when a Pull Request is opened or updated against main
on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authenticate to Target Org
        run: |
          echo "${{ secrets.SF_TARGET_AUTH_URL }}" > sfdx_auth.txt
          sf org login sfdx-url --sfdx-url-file sfdx_auth.txt --set-default --alias TargetOrg
          rm sfdx_auth.txt

      - name: Resolve Test Classes
        id: resolve_tests
        run: |
          TEST_CLASSES=$(node scripts/resolve-tests.js origin/main)
          echo "test_classes=$TEST_CLASSES" >> $GITHUB_OUTPUT

      - name: Validate Deployment
        run: |
          if [ -n "${{ steps.resolve_tests.outputs.test_classes }}" ]; then
            sf project deploy start \
              --target-org TargetOrg \
              --dry-run \
              --test-level RunSpecifiedTests \
              --tests "${{ steps.resolve_tests.outputs.test_classes }}" \
              --ignore-conflicts
          else
            sf project deploy start \
              --target-org TargetOrg \
              --dry-run \
              --test-level RunLocalTests \
              --ignore-conflicts
          fi
